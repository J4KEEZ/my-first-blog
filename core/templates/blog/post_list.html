{% extends "blog/base.html" %}

{% block content %}
    {% for post in posts %}
        <article class="post">
            <time class="date">
                <aside class="actions">
                    <a class="btn btn-secondary" href="{% url 'post_edit' pk=post.pk %}">
                        {% include 'blog/icons/pencil-fill.svg' %}
                    </a>
                </aside>

                <time class="date">
                    {{ post.published_date }}
                </time>
            </time>
            <h2>{{ post.title }}</h2>
            <p>{{ post.text|linebreaksbr }}</p>
        </article>
    {% endfor %}
{% endblock %}
